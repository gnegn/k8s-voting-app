kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30000  # vote
        hostPort: 5000
        protocol: TCP
      - containerPort: 30001  # result
        hostPort: 5001
        protocol: TCP
      - containerPort: 30080  # ingress http
        hostPort: 8080
        protocol: TCP

  - role: worker
  - role: worker