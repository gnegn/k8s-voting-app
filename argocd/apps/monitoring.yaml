apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.3.3

    helm:
      valueFiles:
        - $values/monitoring/prometheus-values.yaml

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 58.3.3
      helm:
        valueFiles:
          - $values/monitoring/prometheus-values.yaml

    - repoURL: https://github.com/gnegn/k8s-voting-app.git
      targetRevision: HEAD
      ref: values

    - repoURL: https://github.com/gnegn/k8s-voting-app.git
      targetRevision: HEAD
      path: monitoring/configmaps

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true 