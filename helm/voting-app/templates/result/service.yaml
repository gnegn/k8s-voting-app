apiVersion: v1
kind: Service
metadata:
  name: result
  namespace: {{ .Release.Namespace }}
  labels:
    app: result
    {{ include "voting-app.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: result
  ports:
    - port: {{ .Values.result.port }}
      targetPort: {{ .Values.result.port }}
      nodePort: 30001