name: Deploy to EKS

on:
  workflow_run:
    workflows: ["Build and Release"]
    types:
      - completed
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production

env:
  AWS_REGION: eu-west-1
  CLUSTER_NAME: voting-eks
  NAMESPACE: voting

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    environment: production

    permissions:
      id-token: write 
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy voting app
        run: |
          helm upgrade --install voting-app ./helm/voting-app \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values helm/voting-app/values.yaml \
            --values helm/voting-app/values-eks.yaml \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/vote   -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/result -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/worker -n ${{ env.NAMESPACE }}
          echo "\n── Pods ─────────────────────────────────────────"
          kubectl get pods -n ${{ env.NAMESPACE }}