name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - "app/vote/**"
      - "app/result/**"
      - "app/worker/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: vote
            context: ./app/vote
          - name: result
            context: ./app/result
          - name: worker
            context: ./app/worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/voting-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sha-${{ github.sha }}
          name: Release ${{ github.sha }}
          body: |
            ## Images

            ```
            ghcr.io/${{ github.repository_owner }}/voting-vote:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/voting-result:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/voting-worker:${{ github.sha }}
            ```

            ## Changes
            ${{ github.event.head_commit.message }}
          generate_release_notes: true