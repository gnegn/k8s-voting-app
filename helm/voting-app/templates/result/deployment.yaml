apiVersion: apps/v1
kind: Deployment
metadata:
  name: result
  namespace: {{ .Release.Namespace }}
  labels:
    app: result
    {{ include "voting-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.result.replicas }}
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
        - name: result
          image: {{ .Values.result.image }}
          ports:
            - containerPort: {{ .Values.result.port }}
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.result.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.result.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.result.resources | nindent 12 }}