apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voting-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/gnegn/k8s-voting-app.git
    targetRevision: HEAD
    path: helm/voting-app

    helm:
      valueFiles:
        - values.yaml
        - values-eks.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: voting

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true