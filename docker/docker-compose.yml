name: voting-app

services:

  # ── vote (Python / Flask) ──────────────────────────────────
  vote:
    build: ../app/vote
    ports:
      - "5000:80"
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - front-tier
      - back-tier
    restart: unless-stopped

  # ── result (Node.js) ──────────────────────────────────────
  result:
    build: ../app/result
    ports:
      - "5001:80"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - front-tier
      - back-tier
    restart: unless-stopped

  # ── worker (.NET) ─────────────────────────────────────────
  worker:
    build: ../app/worker
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - back-tier
    restart: unless-stopped

  # ── redis ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    networks:
      - back-tier
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── postgres ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
    networks:
      - back-tier
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

networks:
  front-tier:
  back-tier:
    internal: true